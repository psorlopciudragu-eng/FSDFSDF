<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube - 3D Realistic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        #container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1400px;
        }
        
        #cube-wrapper {
            perspective: 1500px;
            width: 500px;
            height: 500px;
            position: relative;
            cursor: grab;
        }
        
        #cube-wrapper:active {
            cursor: grabbing;
        }
        
        #cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }
        
        /* Individual cubies - 3D cubes */
        .cubie {
            position: absolute;
            width: 30%;
            height: 30%;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        
        .cubie .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: rgba(255,255,255,0.3);
            background: linear-gradient(145deg, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.1) 100%);
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.3), 
                        inset 0 -1px 3px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        .cubie .side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            pointer-events: none;
        }
        
        /* Face colors - SHINY TEXTURED */
        .color-W .side { background: linear-gradient(145deg, #ffffff 0%, #e0e0e0 100%); box-shadow: inset 0 1px 5px rgba(255,255,255,0.5), inset 0 -2px 5px rgba(0,0,0,0.2); }
        .color-Y .side { background: linear-gradient(145deg, #ffff00 0%, #e0e000 100%); box-shadow: inset 0 1px 5px rgba(255,255,0,0.5), inset 0 -2px 5px rgba(0,0,0,0.2); }
        .color-R .side { background: linear-gradient(145deg, #ff0000 0%, #cc0000 100%); box-shadow: inset 0 1px 5px rgba(255,0,0,0.5), inset 0 -2px 5px rgba(0,0,0,0.4); }
        .color-O .side { background: linear-gradient(145deg, #ff8c00 0%, #e07000 100%); box-shadow: inset 0 1px 5px rgba(255,140,0,0.5), inset 0 -2px 5px rgba(0,0,0,0.2); }
        .color-G .side { background: linear-gradient(145deg, #00ff00 0%, #00cc00 100%); box-shadow: inset 0 1px 5px rgba(0,255,0,0.5), inset 0 -2px 5px rgba(0,0,0,0.4); }
        .color-B .side { background: linear-gradient(145deg, #0000ff 0%, #0000cc 100%); box-shadow: inset 0 1px 5px rgba(0,0,255,0.5), inset 0 -2px 5px rgba(0,0,0,0.4); }
        
        /* Side positioning */
        .side.front  { transform: rotateY(  0deg) translateZ(50%); }
        .side.back   { transform: rotateY(180deg) translateZ(50%); }
        .side.right  { transform: rotateY( 90deg) translateZ(50%); }
        .side.left   { transform: rotateY(-90deg) translateZ(50%); }
        .side.up     { transform: rotateX( 90deg) translateZ(50%); }
        .side.down   { transform: rotateX(-90deg) translateZ(50%); }
        
        .controls {
            background: rgba(0,0,0,0.7);
            padding: 25px;
            border-radius: 15px;
            min-width: 350px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .controls h2 {
            margin-bottom: 20px;
            color: #06ffa5;
            text-align: center;
            font-size: 1.5em;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group h3 {
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #333 0%, #222 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        /* Arrow buttons with curved arrows */
        button.arrow-R { background: linear-gradient(145deg, #ff4444 0%, #cc0000 100%); }
        button.arrow-L { background: linear-gradient(145deg, #ffaa44 0%, #cc7000 100%); }
        button.arrow-U { background: linear-gradient(145deg, #ffffff 0%, #e0e0e0 100%); color: #000; }
        button.arrow-D { background: linear-gradient(145deg, #ffff44 0%, #e0e000 100%); color: #000; }
        button.arrow-F { background: linear-gradient(145deg, #44ff44 0%, #00cc00 100%); }
        button.arrow-B { background: linear-gradient(145deg, #4444ff 0%, #0000cc 100%); }
        
        button.arrow-R::after { content: '→'; font-size: 24px; }
        button.arrow-L::after { content: '←'; font-size: 24px; }
        button.arrow-U::after { content: '↑'; font-size: 24px; }
        button.arrow-D::after { content: '↓'; font-size: 24px; }
        button.arrow-F::after { content: '↗'; font-size: 24px; transform: rotate(45deg); }
        button.arrow-B::after { content: '↖'; font-size: 24px; transform: rotate(-45deg); }
        
        button.arrow-R.prime::after { content: '←'; font-size: 24px; }
        button.arrow-L.prime::after { content: '→'; font-size: 24px; }
        button.arrow-U.prime::after { content: '↓'; font-size: 24px; }
        button.arrow-D.prime::after { content: '↑'; font-size: 24px; }
        button.arrow-F.prime::after { content: '↖'; font-size: 24px; transform: rotate(-45deg); }
        button.arrow-B.prime::after { content: '↗'; font-size: 24px; transform: rotate(45deg); }
        
        button.prime {
            background: linear-gradient(145deg, #444 0%, #333 100%) !important;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .action-buttons button {
            flex: 1;
            font-size: 16px;
            padding: 12px;
        }
        
        .scramble-btn {
            background: linear-gradient(145deg, #ff006e 0%, #8338ec 100%) !important;
            font-size: 18px;
        }
        
        .reset-btn {
            background: linear-gradient(145deg, #3a86ff 0%, #06ffa5 100%) !important;
            font-size: 18px;
        }
        
        .status {
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .status::-webkit-scrollbar {
            width: 6px;
        }
        
        .status::-webkit-scrollbar-track {
            background: #111;
        }
        
        .status::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        
        .color-key {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .color-label {
            font-size: 12px;
            color: #aaa;
        }
        
        @media (max-width: 1000px) {
            #container {
                flex-direction: column;
                align-items: center;
            }
            #cube-wrapper {
                width: 350px;
                height: 350px;
            }
        }
        
        @media (max-width: 600px) {
            #cube-wrapper {
                width: 280px;
                height: 280px;
            }
            .controls {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>🧊 Rubik's Cube</h1>
    <p class="subtitle">Drag to rotate view • Click arrows to move • Real 3D cubies</p>
    
    <div id="container">
        <div id="cube-wrapper">
            <div id="cube"></div>
        </div>
        
        <div class="controls">
            <h2>Controls</h2>
            
            <div class="color-key">
                <div class="color-item">
                    <div class="color-swatch" style="background: linear-gradient(145deg, #ffffff 0%, #e0e0e0 100%);"></div>
                    <span class="color-label">White</span>
                </div>
                <div class="color-item">
                    <div class="color-swatch" style="background: linear-gradient(145deg, #ffff00 0%, #e0e000 100%);"></div>
                    <span class="color-label">Yellow</span>
                </div>
                <div class="color-item">
                    <div class="color-swatch" style="background: linear-gradient(145deg, #ff0000 0%, #cc0000 100%);"></div>
                    <span class="color-label">Red</span>
                </div>
                <div class="color-item">
                    <div class="color-swatch" style="background: linear-gradient(145deg, #ff8c00 0%, #e07000 100%);"></div>
                    <span class="color-label">Orange</span>
                </div>
                <div class="color-item">
                    <div class="color-swatch" style="background: linear-gradient(145deg, #00ff00 0%, #00cc00 100%);"></div>
                    <span class="color-label">Green</span>
                </div>
                <div class="color-item">
                    <div class="color-swatch" style="background: linear-gradient(145deg, #0000ff 0%, #0000cc 100%);"></div>
                    <span class="color-label">Blue</span>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="scramble-btn" onclick="scramble()">🔀 SCRAMBLE</button>
                <button class="reset-btn" onclick="reset()">🔄 RESET</button>
            </div>
            
            <div class="control-group">
                <h3>Top & Bottom</h3>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-U" onclick="rotate('U')"></button>
                    <button></button>
                </div>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-U prime" onclick="rotate('U', true)"></button>
                    <button></button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Front & Back</h3>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-F" onclick="rotate('F')"></button>
                    <button></button>
                </div>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-F prime" onclick="rotate('F', true)"></button>
                    <button></button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Left & Right</h3>
                <div class="button-grid">
                    <button class="arrow-L" onclick="rotate('L')"></button>
                    <button></button>
                    <button class="arrow-R" onclick="rotate('R')"></button>
                </div>
                <div class="button-grid">
                    <button class="arrow-L prime" onclick="rotate('L', true)"></button>
                    <button></button>
                    <button class="arrow-R prime" onclick="rotate('R', true)"></button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Back</h3>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-B" onclick="rotate('B')"></button>
                    <button></button>
                </div>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-B prime" onclick="rotate('B', true)"></button>
                    <button></button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Bottom</h3>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-D" onclick="rotate('D')"></button>
                    <button></button>
                </div>
                <div class="button-grid">
                    <button></button>
                    <button class="arrow-D prime" onclick="rotate('D', true)"></button>
                    <button></button>
                </div>
            </div>
            
            <div class="status" id="status">Drag cube to rotate view. Click arrows to move. Ready!</div>
        </div>
    </div>
    
    <script>
        // Cube state: 6 faces, each 3x3
        // Each cubie has a position and color for each visible face
        let cube = {
            front: [['G','G','G'],['G','G','G'],['G','G','G']],
            back:  [['B','B','B'],['B','B','B'],['B','B','B']],
            right: [['R','R','R'],['R','R','R'],['R','R','R']],
            left:  [['O','O','O'],['O','O','O'],['O','O','O']],
            up:    [['W','W','W'],['W','W','W'],['W','W','W']],
            down:  [['Y','Y','Y'],['Y','Y','Y'],['Y','Y','Y']]
        };
        
        let moveHistory = [];
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let rotateX = -15;
        let rotateY = 30;
        let zoom = 100;
        
        const cubeEl = document.getElementById('cube');
        const wrapperEl = document.getElementById('cube-wrapper');
        const statusEl = document.getElementById('status');
        
        const COLORS = {
            'W': 'color-W',
            'Y': 'color-Y',
            'R': 'color-R',
            'O': 'color-O',
            'G': 'color-G',
            'B': 'color-B'
        };
        
        // Create 3D cubies
        function createCubies() {
            cubeEl.innerHTML = '';
            
            // Cubie positions: each position is [face, row, col]
            // We need to create 27 cubies (3x3x3)
            // But we only render the visible ones based on current view
            
            // For simplicity, we'll create all 27 cubies and position them
            const size = 100; // Percentage of wrapper
            const offset = size / 2;
            
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    for (let z = 0; z < 3; z++) {
                        const cubie = document.createElement('div');
                        cubie.className = 'cubie';
                        
                        // Position the cubie
                        const posX = (x - 1) * size;
                        const posY = (y - 1) * size;
                        const posZ = (z - 1) * size;
                        
                        cubie.style.transform = `translateX(${posX}%) translateY(${posY}%) translateZ(${posZ}%)`;
                        
                        // Determine which faces are visible and their colors
                        const faces = [];
                        
                        // Front face (z = 2)
                        if (z === 2) {
                            const color = cube.front[y][x];
                            faces.push({ side: 'front', color: color });
                        }
                        
                        // Back face (z = 0)
                        if (z === 0) {
                            const color = cube.back[y][2 - x];
                            faces.push({ side: 'back', color: color });
                        }
                        
                        // Right face (x = 2)
                        if (x === 2) {
                            const color = cube.right[y][z];
                            faces.push({ side: 'right', color: color });
                        }
                        
                        // Left face (x = 0)
                        if (x === 0) {
                            const color = cube.left[y][2 - z];
                            faces.push({ side: 'left', color: color });
                        }
                        
                        // Up face (y = 0)
                        if (y === 0) {
                            const color = cube.up[2 - z][x];
                            faces.push({ side: 'up', color: color });
                        }
                        
                        // Down face (y = 2)
                        if (y === 2) {
                            const color = cube.down[z][x];
                            faces.push({ side: 'down', color: color });
                        }
                        
                        // Create sides
                        faces.forEach(face => {
                            const side = document.createElement('div');
                            side.className = `side ${face.side} ${COLORS[face.color]}`;
                            cubie.appendChild(side);
                        });
                        
                        cubeEl.appendChild(cubie);
                    }
                }
            }
            
            // Apply view rotation
            cubeEl.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${zoom/100})`;
        }
        
        function updateStatus() {
            const solved = isSolved();
            const status = solved ? '✅ SOLVED!' : '❌ Scrambled';
            statusEl.textContent = `Status: ${status}\nMoves: ${moveHistory.slice(-8).join(' ')}${moveHistory.length > 8 ? '...' : ''}`;
        }
        
        function isSolved() {
            for (const face in cube) {
                const center = cube[face][1][1];
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        if (cube[face][r][c] !== center) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }
        
        function rotate(face, prime = false) {
            const move = prime ? `${face}'` : face;
            moveHistory.push(move);
            
            switch(face) {
                case 'R': doR(prime); break;
                case 'L': doL(prime); break;
                case 'U': doU(prime); break;
                case 'D': doD(prime); break;
                case 'F': doF(prime); break;
                case 'B': doB(prime); break;
            }
            
            createCubies();
            updateStatus();
        }
        
        function doR(prime) {
            rotateFace('right', !prime);
            const upCol = [cube.up[0][2], cube.up[1][2], cube.up[2][2]];
            const frontCol = [cube.front[0][2], cube.front[1][2], cube.front[2][2]];
            const downCol = [cube.down[0][2], cube.down[1][2], cube.down[2][2]];
            const backCol = [cube.back[0][0], cube.back[1][0], cube.back[2][0]];
            
            if (!prime) {
                for (let i = 0; i < 3; i++) {
                    cube.up[i][2] = backCol[2 - i];
                    cube.front[i][2] = upCol[i];
                    cube.down[i][2] = frontCol[i];
                    cube.back[i][0] = downCol[2 - i];
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    cube.up[i][2] = frontCol[i];
                    cube.front[i][2] = downCol[i];
                    cube.down[i][2] = backCol[2 - i];
                    cube.back[i][0] = upCol[i];
                }
            }
        }
        
        function doL(prime) {
            rotateFace('left', !prime);
            const upCol = [cube.up[0][0], cube.up[1][0], cube.up[2][0]];
            const backCol = [cube.back[0][2], cube.back[1][2], cube.back[2][2]];
            const downCol = [cube.down[0][0], cube.down[1][0], cube.down[2][0]];
            const frontCol = [cube.front[0][0], cube.front[1][0], cube.front[2][0]];
            
            if (!prime) {
                for (let i = 0; i < 3; i++) {
                    cube.up[i][0] = frontCol[i];
                    cube.back[i][2] = upCol[2 - i];
                    cube.down[i][0] = backCol[2 - i];
                    cube.front[i][0] = downCol[i];
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    cube.up[i][0] = backCol[2 - i];
                    cube.back[i][2] = downCol[i];
                    cube.down[i][0] = frontCol[i];
                    cube.front[i][0] = upCol[i];
                }
            }
        }
        
        function doU(prime) {
            rotateFace('up', !prime);
            const frontRow = [cube.front[0][0], cube.front[0][1], cube.front[0][2]];
            const rightRow = [cube.right[0][0], cube.right[0][1], cube.right[0][2]];
            const backRow = [cube.back[0][0], cube.back[0][1], cube.back[0][2]];
            const leftRow = [cube.left[0][0], cube.left[0][1], cube.left[0][2]];
            
            if (!prime) {
                for (let i = 0; i < 3; i++) {
                    cube.front[0][i] = leftRow[i];
                    cube.right[0][i] = frontRow[i];
                    cube.back[0][i] = rightRow[2 - i];
                    cube.left[0][i] = backRow[2 - i];
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    cube.front[0][i] = rightRow[i];
                    cube.right[0][i] = backRow[2 - i];
                    cube.back[0][i] = leftRow[2 - i];
                    cube.left[0][i] = frontRow[i];
                }
            }
        }
        
        function doD(prime) {
            rotateFace('down', !prime);
            const frontRow = [cube.front[2][0], cube.front[2][1], cube.front[2][2]];
            const leftRow = [cube.left[2][0], cube.left[2][1], cube.left[2][2]];
            const backRow = [cube.back[2][0], cube.back[2][1], cube.back[2][2]];
            const rightRow = [cube.right[2][0], cube.right[2][1], cube.right[2][2]];
            
            if (!prime) {
                for (let i = 0; i < 3; i++) {
                    cube.front[2][i] = rightRow[i];
                    cube.left[2][i] = frontRow[i];
                    cube.back[2][i] = leftRow[2 - i];
                    cube.right[2][i] = backRow[2 - i];
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    cube.front[2][i] = leftRow[i];
                    cube.left[2][i] = backRow[2 - i];
                    cube.back[2][i] = rightRow[2 - i];
                    cube.right[2][i] = frontRow[i];
                }
            }
        }
        
        function doF(prime) {
            rotateFace('front', !prime);
            const upRow = [cube.up[2][0], cube.up[2][1], cube.up[2][2]];
            const leftCol = [cube.left[0][2], cube.left[1][2], cube.left[2][2]];
            const downRow = [cube.down[0][0], cube.down[0][1], cube.down[0][2]];
            const rightCol = [cube.right[0][0], cube.right[1][0], cube.right[2][0]];
            
            if (!prime) {
                for (let i = 0; i < 3; i++) {
                    cube.up[2][i] = leftCol[2 - i];
                    cube.left[i][2] = downRow[i];
                    cube.down[0][i] = rightCol[2 - i];
                    cube.right[i][0] = upRow[i];
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    cube.up[2][i] = rightCol[2 - i];
                    cube.right[i][0] = downRow[i];
                    cube.down[0][i] = leftCol[2 - i];
                    cube.left[i][2] = upRow[i];
                }
            }
        }
        
        function doB(prime) {
            rotateFace('back', !prime);
            const upRow = [cube.up[0][0], cube.up[0][1], cube.up[0][2]];
            const rightCol = [cube.right[0][2], cube.right[1][2], cube.right[2][2]];
            const downRow = [cube.down[2][0], cube.down[2][1], cube.down[2][2]];
            const leftCol = [cube.left[0][0], cube.left[1][0], cube.left[2][0]];
            
            if (!prime) {
                for (let i = 0; i < 3; i++) {
                    cube.up[0][i] = rightCol[2 - i];
                    cube.right[i][2] = downRow[i];
                    cube.down[2][i] = leftCol[2 - i];
                    cube.left[i][0] = upRow[i];
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    cube.up[0][i] = leftCol[i];
                    cube.left[i][0] = downRow[2 - i];
                    cube.down[2][i] = rightCol[i];
                    cube.right[i][2] = upRow[2 - i];
                }
            }
        }
        
        function rotateFace(faceName, clockwise) {
            const face = cube[faceName];
            if (clockwise) {
                const newFace = [
                    [face[2][0], face[1][0], face[0][0]],
                    [face[2][1], face[1][1], face[0][1]],
                    [face[2][2], face[1][2], face[0][2]]
                ];
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        face[r][c] = newFace[r][c];
                    }
                }
            } else {
                const newFace = [
                    [face[0][2], face[1][2], face[2][2]],
                    [face[0][1], face[1][1], face[2][1]],
                    [face[0][0], face[1][0], face[2][0]]
                ];
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        face[r][c] = newFace[r][c];
                    }
                }
            }
        }
        
        function scramble() {
            const moves = ['R', 'L', 'U', 'D', 'F', 'B'];
            const count = 20 + Math.floor(Math.random() * 10);
            
            for (let i = 0; i < count; i++) {
                const move = moves[Math.floor(Math.random() * moves.length)];
                const prime = Math.random() > 0.5;
                rotate(move, prime);
            }
            
            statusEl.textContent = `Scrambled with ${count} moves!\nLast: ${moveHistory.slice(-8).join(' ')}`;
        }
        
        function reset() {
            cube = {
                front: [['G','G','G'],['G','G','G'],['G','G','G']],
                back:  [['B','B','B'],['B','B','B'],['B','B','B']],
                right: [['R','R','R'],['R','R','R'],['R','R','R']],
                left:  [['O','O','O'],['O','O','O'],['O','O','O']],
                up:    [['W','W','W'],['W','W','W'],['W','W','W']],
                down:  [['Y','Y','Y'],['Y','Y','Y'],['Y','Y','Y']]
            };
            moveHistory = [];
            createCubies();
            updateStatus();
            statusEl.textContent = 'Reset! Cube is solved.';
        }
        
        // Drag to rotate view
        wrapperEl.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const dx = e.clientX - lastMouseX;
            const dy = e.clientY - lastMouseY;
            
            rotateY += dx * 0.5;
            rotateX -= dy * 0.5;
            
            rotateX = Math.max(-80, Math.min(80, rotateX));
            
            cubeEl.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${zoom/100})`;
            
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        // Mouse wheel to zoom
        wrapperEl.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom += e.deltaY * 0.1;
            zoom = Math.max(50, Math.min(200, zoom));
            cubeEl.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${zoom/100})`;
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'r': 'R', 'R': 'R',
                'l': 'L', 'L': 'L',
                'u': 'U', 'U': 'U',
                'd': 'D', 'D': 'D',
                'f': 'F', 'F': 'F',
                'b': 'B', 'B': 'B'
            };
            
            const key = e.key;
            if (key in keyMap) {
                e.preventDefault();
                rotate(keyMap[key]);
            }
        });
        
        // Initialize
        createCubies();
        updateStatus();
    </script>
</body>
</html>
