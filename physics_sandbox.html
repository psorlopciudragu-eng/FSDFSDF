<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIMPLE PHYSICS - WORKS</title>
<style>
    body { margin: 0; background: #111; font-family: Arial; color: #fff; }
    #canvas { display: block; background: #000; }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.7);
        padding: 10px;
        border-radius: 5px;
    }
    button {
        background: #00ff88;
        color: #000;
        border: none;
        padding: 8px 12px;
        margin: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover { background: #00e67a; }
    select, input { margin: 5px; padding: 5px; background: #333; color: #fff; border: 1px solid #555; }
</style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div>
            <button id="mode-add" onclick="mode='add'">ADD</button>
            <button id="mode-grab" onclick="mode='grab'">GRAB</button>
            <button id="mode-delete" onclick="mode='delete'">DELETE</button>
        </div>
        <div>
            <select id="type"><option value="circle">Circle</option><option value="rect">Rect</option></select>
            <input type="range" id="size" min="10" max="50" value="25">
            <label><input type="checkbox" id="fixed"> Fixed</label>
        </div>
        <div>
            <label>Gravity: <input type="range" id="gravity" min="0" max="2" step="0.1" value="1"></label>
            <label>Bounce: <input type="range" id="bounce" min="0" max="1" step="0.1" value="0.7"></label>
        </div>
        <div>
            <button onclick="clearAll()">CLEAR</button>
            <button onclick="makeWall()">WALL</button>
            <button onclick="makeStack()">STACK</button>
        </div>
        <div id="stats">FPS: 60 | Objects: 0</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Camera
        let cam = { x: 0, y: 0, zoom: 1 };
        
        // Mouse
        let mouse = { x: 0, y: 0, down: false, rightDown: false, dragged: null, offsetX: 0, offsetY: 0, lastX: 0, lastY: 0, lastTime: 0, vx: 0, vy: 0 };
        
        // Mode
        let mode = 'add';
        
        // Physics
        let gravity = 1;
        let bounce = 0.7;
        
        // Objects
        let objects = [];
        
        // Convert screen to world
        function toWorld(sx, sy) {
            return {
                x: (sx - canvas.width/2) / cam.zoom + cam.x,
                y: (sy - canvas.height/2) / cam.zoom + cam.y
            };
        }
        
        // Convert world to screen
        function toScreen(wx, wy) {
            return {
                x: (wx - cam.x) * cam.zoom + canvas.width/2,
                y: (wy - cam.y) * cam.zoom + canvas.height/2
            };
        }
        
        // Object class
        class Obj {
            constructor(x, y, type, size, fixed) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.size = size;
                this.fixed = fixed;
                this.vx = 0;
                this.vy = 0;
                this.color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            }
            
            update(dt) {
                if (this.fixed) return;
                
                // Gravity
                this.vy += gravity * dt * 60;
                
                // Friction (air resistance)
                this.vx *= 0.995;
                this.vy *= 0.995;
                
                // Move
                this.x += this.vx * dt * 60;
                this.y += this.vy * dt * 60;
            }
            
            draw() {
                const s = toScreen(this.x, this.y);
                ctx.fillStyle = this.color;
                ctx.strokeStyle = this.fixed ? '#ffff00' : '#ffffff';
                ctx.lineWidth = 1;
                
                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, this.size * cam.zoom, 0, Math.PI*2);
                    ctx.fill();
                    ctx.stroke();
                } else {
                    ctx.fillRect(s.x - this.size * cam.zoom, s.y - this.size * cam.zoom, this.size * 2 * cam.zoom, this.size * 2 * cam.zoom);
                    ctx.strokeRect(s.x - this.size * cam.zoom, s.y - this.size * cam.zoom, this.size * 2 * cam.zoom, this.size * 2 * cam.zoom);
                }
            }
            
            contains(px, py) {
                if (this.type === 'circle') {
                    const dx = px - this.x;
                    const dy = py - this.y;
                    return dx*dx + dy*dy <= this.size*this.size;
                } else {
                    return px >= this.x - this.size && px <= this.x + this.size &&
                           py >= this.y - this.size && py <= this.y + this.size;
                }
            }
        }
        
        // Add object
        function addObject(x, y) {
            const type = document.getElementById('type').value;
            const size = parseInt(document.getElementById('size').value);
            const fixed = document.getElementById('fixed').checked;
            objects.push(new Obj(x, y, type, size/2, fixed));
        }
        
        // Find object at position
        function findObject(px, py) {
            for (let i = objects.length - 1; i >= 0; i--) {
                if (objects[i].contains(px, py)) return objects[i];
            }
            return null;
        }
        
        // Collision check
        function checkCollisions() {
            for (let i = 0; i < objects.length; i++) {
                for (let j = i + 1; j < objects.length; j++) {
                    const a = objects[i];
                    const b = objects[j];
                    
                    if (a.fixed && b.fixed) continue;
                    
                    // Circle-circle collision
                    if (a.type === 'circle' && b.type === 'circle') {
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const minDist = a.size + b.size;
                        
                        if (dist < minDist) {
                            // Push apart
                            const overlap = minDist - dist;
                            const nx = dx / dist;
                            const ny = dy / dist;
                            
                            if (!a.fixed && !b.fixed) {
                                a.x -= nx * overlap/2;
                                a.y -= ny * overlap/2;
                                b.x += nx * overlap/2;
                                b.y += ny * overlap/2;
                            } else if (!a.fixed) {
                                a.x -= nx * overlap;
                                a.y -= ny * overlap;
                            } else if (!b.fixed) {
                                b.x += nx * overlap;
                                b.y += ny * overlap;
                            }
                            
                            // Bounce
                            const rvx = b.vx - a.vx;
                            const rvy = b.vy - a.vy;
                            const dot = rvx * nx + rvy * ny;
                            
                            if (dot < 0) {
                                const impulse = -(1 + bounce) * dot;
                                const massA = a.fixed ? 10000 : 1;
                                const massB = b.fixed ? 10000 : 1;
                                
                                if (!a.fixed) {
                                    a.vx -= impulse * nx / massA;
                                    a.vy -= impulse * ny / massA;
                                }
                                if (!b.fixed) {
                                    b.vx += impulse * nx / massB;
                                    b.vy += impulse * ny / massB;
                                }
                            }
                        }
                    }
                    
                    // Rect-rect collision
                    if (a.type === 'rect' && b.type === 'rect') {
                        const overlapX = Math.min(a.x + a.size, b.x + b.size) - Math.max(a.x - a.size, b.x - b.size);
                        const overlapY = Math.min(a.y + a.size, b.y + b.size) - Math.max(a.y - a.size, b.y - b.size);
                        
                        if (overlapX > 0 && overlapY > 0) {
                            const nx = a.x < b.x ? -1 : 1;
                            const ny = a.y < b.y ? -1 : 1;
                            
                            if (overlapX < overlapY) {
                                if (!a.fixed && !b.fixed) {
                                    a.x -= nx * overlapX/2;
                                    b.x += nx * overlapX/2;
                                } else if (!a.fixed) {
                                    a.x -= nx * overlapX;
                                } else if (!b.fixed) {
                                    b.x += nx * overlapX;
                                }
                                
                                const temp = a.vx;
                                a.vx = b.vx * bounce;
                                b.vx = temp * bounce;
                            } else {
                                if (!a.fixed && !b.fixed) {
                                    a.y -= ny * overlapY/2;
                                    b.y += ny * overlapY/2;
                                } else if (!a.fixed) {
                                    a.y -= ny * overlapY;
                                } else if (!b.fixed) {
                                    b.y += ny * overlapY;
                                }
                                
                                const temp = a.vy;
                                a.vy = b.vy * bounce;
                                b.vy = temp * bounce;
                            }
                        }
                    }
                }
            }
        }
        
        // Presets
        function clearAll() {
            objects = [];
        }
        
        function makeWall() {
            clearAll();
            // Fixed floor
            for (let i = -4; i <= 4; i++) {
                objects.push(new Obj(i * 40, 150, 'rect', 20, true));
            }
            // Bouncing ball
            objects.push(new Obj(0, 50, 'circle', 15, false));
            objects[objects.length-1].vy = -10;
        }
        
        function makeStack() {
            clearAll();
            for (let i = 0; i < 5; i++) {
                objects.push(new Obj(0, -i * 30, 'rect', 25, false));
            }
        }
        
        // Event handlers
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.screenX = e.clientX - rect.left;
            mouse.screenY = e.clientY - rect.top;
            const world = toWorld(mouse.screenX, mouse.screenY);
            mouse.x = world.x;
            mouse.y = world.y;
            mouse.lastX = mouse.x;
            mouse.lastY = mouse.y;
            mouse.lastTime = Date.now();
            
            if (e.button === 2) {
                mouse.rightDown = true;
                return;
            }
            
            if (e.button === 0) {
                mouse.down = true;
                
                if (mode === 'add') {
                    addObject(mouse.x, mouse.y);
                }
                else if (mode === 'grab') {
                    const obj = findObject(mouse.x, mouse.y);
                    if (obj) {
                        mouse.dragged = obj;
                        mouse.offsetX = obj.x - mouse.x;
                        mouse.offsetY = obj.y - mouse.y;
                        obj.vx = 0;
                        obj.vy = 0;
                    }
                }
                else if (mode === 'delete') {
                    for (let i = objects.length - 1; i >= 0; i--) {
                        if (objects[i].contains(mouse.x, mouse.y)) {
                            objects.splice(i, 1);
                            break;
                        }
                    }
                }
            }
        });
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.screenX = e.clientX - rect.left;
            mouse.screenY = e.clientY - rect.top;
            const world = toWorld(mouse.screenX, mouse.screenY);
            const now = Date.now();
            const dt = (now - mouse.lastTime) / 1000;
            mouse.lastTime = now;
            
            // Track mouse velocity
            if (dt > 0 && dt < 0.1) {
                mouse.vx = (world.x - mouse.x) / dt;
                mouse.vy = (world.y - mouse.y) / dt;
            }
            
            mouse.x = world.x;
            mouse.y = world.y;
            
            if (mouse.rightDown) {
                cam.x -= (mouse.x - mouse.lastX);
                cam.y -= (mouse.y - mouse.lastY);
                mouse.lastX = mouse.x;
                mouse.lastY = mouse.y;
                return;
            }
            
            if (mouse.down && mouse.dragged) {
                mouse.dragged.x = mouse.x + mouse.offsetX;
                mouse.dragged.y = mouse.y + mouse.offsetY;
            }
            
            mouse.lastX = mouse.x;
            mouse.lastY = mouse.y;
        });
        
        canvas.addEventListener('mouseup', e => {
            if (e.button === 2) {
                mouse.rightDown = false;
                return;
            }
            
            if (e.button === 0) {
                // Transfer velocity on release
                if (mouse.dragged && !mouse.dragged.fixed) {
                    mouse.dragged.vx = mouse.vx * 0.5;
                    mouse.dragged.vy = mouse.vy * 0.5;
                }
                mouse.down = false;
                mouse.dragged = null;
            }
        });
        
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const oldZoom = cam.zoom;
            cam.zoom = Math.max(0.5, Math.min(2, cam.zoom * zoomFactor));
            
            // Zoom towards mouse
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const world = toWorld(mx, my);
            cam.x = world.x - (mx - canvas.width/2) / canvas.width * (1/oldZoom - 1/cam.zoom) * canvas.width;
            cam.y = world.y - (my - canvas.height/2) / canvas.height * (1/oldZoom - 1/cam.zoom) * canvas.height;
        });
        
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        // UI updates
        document.getElementById('gravity').addEventListener('input', e => {
            gravity = parseFloat(e.target.value);
        });
        document.getElementById('bounce').addEventListener('input', e => {
            bounce = parseFloat(e.target.value);
        });
        
        // Main loop
        let lastTime = Date.now();
        let fps = 60;
        let frameCount = 0;
        let startTime = Date.now();
        
        function update(dt) {
            for (let obj of objects) {
                obj.update(dt);
            }
            
            checkCollisions();
            
            // Keep objects on screen
            for (let obj of objects) {
                if (obj.y > 200 && !obj.fixed) {
                    obj.y = 200;
                    obj.vy = 0;
                }
            }
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            const gridSize = 50 * cam.zoom;
            const startX = (cam.x - canvas.width/(2*cam.zoom)) % gridSize;
            const startY = (cam.y - canvas.height/(2*cam.zoom)) % gridSize;
            
            for (let x = startX; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = startY; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Objects
            for (let obj of objects) {
                obj.draw();
            }
            
            // Stats
            frameCount++;
            const now = Date.now();
            if (now - startTime > 1000) {
                fps = frameCount;
                frameCount = 0;
                startTime = now;
            }
            document.getElementById('stats').textContent = `FPS: ${fps} | Objects: ${objects.length} | Mode: ${mode.toUpperCase()}`;
        }
        
        function gameLoop() {
            const now = Date.now();
            const dt = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;
            
            update(dt);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Start
        gameLoop();
        
        // Initialize with some objects
        makeWall();
    </script>
</body>
</html>
