<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Tic Tac Toe - Modern Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0a0a0;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            margin: 2rem auto;
            max-width: 300px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .cell.x {
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        .cell.o {
            color: #ff3e78;
            text-shadow: 0 0 15px rgba(255, 62, 120, 0.5);
        }

        .status {
            font-size: 1.5rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .player-indicator {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0;
        }

        .player {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .player.active {
            background: rgba(0, 210, 255, 0.3);
            border: 1px solid #00d2ff;
        }

        .player span {
            font-size: 1.2rem;
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 1rem 0;
            color: #a0a0a0;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .winner-animation {
            animation: pulse 0.5s ease;
        }

        @media (max-width: 480px) {
            .board {
                max-width: 250px;
            }
            
            .cell {
                font-size: 3rem;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>
        <p class="subtitle">Modern Edition - 2024</p>
        
        <div class="score">
            <div class="score-item">
                <div class="score-label">Player X</div>
                <div class="score-value" id="score-x">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Ties</div>
                <div class="score-value" id="score-tie">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Player O</div>
                <div class="score-value" id="score-o">0</div>
            </div>
        </div>

        <div class="player-indicator">
            <div class="player active" id="player-x">
                <span>✕</span>
                <span>Player X</span>
            </div>
            <div class="player" id="player-o">
                <span>⭕</span>
                <span>Player O</span>
            </div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="status" id="status">Your turn, Player X!</div>

        <div class="controls">
            <button id="reset">Reset Game</button>
            <button id="new-game">New Game</button>
        </div>
    </div>

    <script>
        // Game state
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let scores = { X: 0, O: 0, tie: 0 };

        // Winning combinations
        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
            [0, 4, 8], [2, 4, 6]             // diagonals
        ];

        // DOM elements
        const cells = document.querySelectorAll('.cell');
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const resetButton = document.getElementById('reset');
        const newGameButton = document.getElementById('new-game');
        const playerXElement = document.getElementById('player-x');
        const playerOElement = document.getElementById('player-o');
        const scoreXElement = document.getElementById('score-x');
        const scoreOElement = document.getElementById('score-o');
        const scoreTieElement = document.getElementById('score-tie');

        // Initialize the game
        function init() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o', 'winner');
            });
            
            updateStatus();
            updatePlayerIndicator();
            boardElement.classList.remove('game-over');
        }

        // Handle cell click
        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.dataset.index);
            
            if (!gameActive || board[index] !== '') return;
            
            // Make the move
            board[index] = currentPlayer;
            cell.textContent = currentPlayer === 'X' ? '✕' : '⭕';
            cell.classList.add(currentPlayer.toLowerCase());
            
            // Check for winner
            checkResult();
        }

        // Check if game is over
        function checkResult() {
            let roundWon = false;
            
            // Check all win conditions
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    // Highlight winning cells
                    cells[a].classList.add('winner');
                    cells[b].classList.add('winner');
                    cells[c].classList.add('winner');
                    break;
                }
            }

            // If someone won
            if (roundWon) {
                gameActive = false;
                scores[currentPlayer]++;
                updateScores();
                updateStatus(`Player ${currentPlayer} wins! 🎉`);
                boardElement.classList.add('game-over');
                return;
            }

            // If it's a tie
            if (!board.includes('')) {
                gameActive = false;
                scores.tie++;
                updateScores();
                updateStatus("It's a tie! 🤝");
                boardElement.classList.add('game-over');
                return;
            }

            // Switch player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatus();
            updatePlayerIndicator();
        }

        // Update status message
        function updateStatus(message = null) {
            if (message) {
                statusElement.textContent = message;
            } else {
                statusElement.textContent = `Your turn, Player ${currentPlayer}!`;
            }
        }

        // Update player indicator
        function updatePlayerIndicator() {
            playerXElement.classList.toggle('active', currentPlayer === 'X');
            playerOElement.classList.toggle('active', currentPlayer === 'O');
        }

        // Update scores
        function updateScores() {
            scoreXElement.textContent = scores.X;
            scoreOElement.textContent = scores.O;
            scoreTieElement.textContent = scores.tie;
        }

        // Reset current game
        function resetGame() {
            init();
        }

        // Start new game (reset scores too)
        function newGame() {
            scores = { X: 0, O: 0, tie: 0 };
            updateScores();
            init();
        }

        // Event listeners
        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        resetButton.addEventListener('click', resetGame);
        newGameButton.addEventListener('click', newGame);

        // Initialize
        init();
    </script>
</body>
</html>
