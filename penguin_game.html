<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Penguin Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            text-align: center;
        }
        
        #game-canvas {
            background: #000;
            border: 8px solid #FFF;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #title {
            color: #FFF;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        #subtitle {
            color: #FFF;
            text-shadow: 2px 2px 0 #000;
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        #score-display {
            color: #FFF;
            text-shadow: 2px 2px 0 #000;
            font-size: 24px;
            margin-top: 10px;
        }
        
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #FFF;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        #restart-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        #restart-btn:hover {
            background: #FFA500;
            transform: scale(1.05);
        }
        
        .controls {
            color: #FFF;
            text-shadow: 1px 1px 0 #000;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1 id="title">PENGUIN ADVENTURE</h1>
        <p id="subtitle">Use Arrow Keys to Move | Collect Fish | Avoid Sharks</p>
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="score-display">Score: 0 | Lives: 3</div>
        <div class="controls">
            <p>Arrow Keys - Move | Space - Jump | P - Pause</p>
        </div>
    </div>
    
    <div id="game-over">
        <h2>GAME OVER</h2>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <script>
        // Game Canvas Setup
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        // Game State
        let gameRunning = true;
        let gamePaused = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let fishCollected = 0;
        let fishToWin = 10;

        // Player
        const player = {
            x: 100,
            y: 400,
            width: 40,
            height: 60,
            speed: 5,
            jumpForce: 12,
            velocityY: 0,
            isJumping: false,
            direction: 'right',
            frame: 0,
            frameCount: 0,
            color: '#000'
        };

        // Input
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            ArrowDown: false,
            Space: false
        };

        // Platforms
        let platforms = [
            { x: 0, y: 550, width: 200, height: 50, color: '#FFF' },
            { x: 250, y: 500, width: 200, height: 50, color: '#FFF' },
            { x: 500, y: 450, width: 200, height: 50, color: '#FFF' },
            { x: 750, y: 400, width: 50, height: 50, color: '#FFF' },
            { x: 0, y: 400, width: 50, height: 50, color: '#FFF' },
            { x: 300, y: 350, width: 100, height: 50, color: '#FFF' },
            { x: 600, y: 300, width: 100, height: 50, color: '#FFF' }
        ];

        // Fish (collectibles)
        let fish = [];
        
        // Sharks (enemies)
        let sharks = [];
        
        // Ice blocks (obstacles)
        let iceBlocks = [];

        // Snow particles
        let snowParticles = [];

        // Initialize game objects
        function init() {
            // Clear existing objects
            fish = [];
            sharks = [];
            iceBlocks = [];
            snowParticles = [];

            // Create fish
            for (let i = 0; i < 15; i++) {
                fish.push({
                    x: Math.random() * (canvas.width - 30),
                    y: Math.random() * (canvas.height - 200) + 50,
                    width: 25,
                    height: 15,
                    color: '#FF6B6B',
                    collected: false
                });
            }

            // Create sharks
            for (let i = 0; i < 3; i++) {
                sharks.push({
                    x: Math.random() * (canvas.width - 60),
                    y: Math.random() * (canvas.height - 300) + 100,
                    width: 50,
                    height: 30,
                    speed: 2 + Math.random() * 2,
                    direction: Math.random() > 0.5 ? 1 : -1,
                    color: '#808080'
                });
            }

            // Create ice blocks
            for (let i = 0; i < 5; i++) {
                iceBlocks.push({
                    x: Math.random() * (canvas.width - 40),
                    y: Math.random() * (canvas.height - 300) + 100,
                    width: 40,
                    height: 40,
                    color: '#ADD8E6'
                });
            }

            // Create snow particles
            for (let i = 0; i < 100; i++) {
                snowParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 1
                });
            }

            // Reset player
            player.x = 100;
            player.y = 400;
            player.velocityY = 0;
            player.isJumping = false;
            player.direction = 'right';

            // Reset game state
            score = 0;
            lives = 3;
            level = 1;
            fishCollected = 0;
            fishToWin = 10;
            gameRunning = true;
            gamePaused = false;

            updateScoreDisplay();
        }

        // Update score display
        function updateScoreDisplay() {
            scoreDisplay.textContent = `Score: ${score} | Lives: ${lives} | Level: ${level} | Fish: ${fishCollected}/${fishToWin}`;
        }

        // Handle keyboard input
        window.addEventListener('keydown', (e) => {
            if (e.code in keys) {
                keys[e.code] = true;
            }
            
            // Pause game
            if (e.code === 'KeyP' && gameRunning) {
                gamePaused = !gamePaused;
            }
            
            // Restart game
            if (e.code === 'KeyR' && !gameRunning) {
                init();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code in keys) {
                keys[e.code] = false;
            }
        });

        // Restart button
        restartBtn.addEventListener('click', () => {
            gameOverScreen.style.display = 'none';
            init();
        });

        // Check collision between two rectangles
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // Check if player is on a platform
        function isOnPlatform() {
            for (let platform of platforms) {
                if (
                    player.y + player.height >= platform.y &&
                    player.y + player.height <= platform.y + platform.height &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width
                ) {
                    return true;
                }
            }
            return false;
        }

        // Draw penguin
        function drawPenguin() {
            ctx.save();
            
            // Body
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2, 
                       player.width/2, player.height/2 - 5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Belly
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2 + 5, 
                       player.width/2 - 5, player.height/2 - 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#000';
            const eyeOffset = player.direction === 'right' ? 10 : -10;
            ctx.beginPath();
            ctx.arc(player.x + player.width/2 + eyeOffset, player.y + 20, 5, 0, Math.PI * 2);
            ctx.arc(player.x + player.width/2 - eyeOffset, player.y + 20, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y + 25);
            ctx.lineTo(player.x + player.width/2 + (player.direction === 'right' ? 10 : -10), player.y + 30);
            ctx.lineTo(player.x + player.width/2 + (player.direction === 'right' ? 10 : -10), player.y + 20);
            ctx.closePath();
            ctx.fill();
            
            // Feet
            ctx.fillStyle = '#FFA500';
            ctx.fillRect(player.x + player.width/2 - 8, player.y + player.height - 10, 8, 5);
            ctx.fillRect(player.x + player.width/2, player.y + player.height - 10, 8, 5);
            
            // Wings
            ctx.fillStyle = '#000';
            if (player.direction === 'right') {
                ctx.fillRect(player.x + 5, player.y + player.height/2 - 5, 15, 10);
            } else {
                ctx.fillRect(player.x + player.width - 20, player.y + player.height/2 - 5, 15, 10);
            }
            
            ctx.restore();
        }

        // Draw fish
        function drawFish(fish) {
            ctx.save();
            ctx.fillStyle = fish.color;
            
            // Fish body
            ctx.beginPath();
            ctx.ellipse(fish.x + fish.width/2, fish.y + fish.height/2, 
                       fish.width/2, fish.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Fish tail
            ctx.beginPath();
            ctx.moveTo(fish.x + fish.width, fish.y + fish.height/2);
            ctx.lineTo(fish.x + fish.width + 10, fish.y);
            ctx.lineTo(fish.x + fish.width + 10, fish.y + fish.height);
            ctx.closePath();
            ctx.fill();
            
            // Fish eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(fish.x + 8, fish.y + fish.height/2, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // Draw shark
        function drawShark(shark) {
            ctx.save();
            ctx.fillStyle = shark.color;
            
            // Shark body
            ctx.beginPath();
            ctx.moveTo(shark.x, shark.y + shark.height/2);
            ctx.lineTo(shark.x + shark.width, shark.y);
            ctx.lineTo(shark.x + shark.width, shark.y + shark.height);
            ctx.closePath();
            ctx.fill();
            
            // Shark fin
            ctx.beginPath();
            ctx.moveTo(shark.x + shark.width/2, shark.y);
            ctx.lineTo(shark.x + shark.width/2 + 10, shark.y - 10);
            ctx.lineTo(shark.x + shark.width/2 + 20, shark.y);
            ctx.closePath();
            ctx.fill();
            
            // Shark eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(shark.x + 10, shark.y + shark.height/2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Shark mouth
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(shark.x, shark.y + shark.height/2);
            ctx.lineTo(shark.x - 5, shark.y + shark.height/2 - 5);
            ctx.lineTo(shark.x - 5, shark.y + shark.height/2 + 5);
            ctx.closePath();
            ctx.stroke();
            
            ctx.restore();
        }

        // Draw ice block
        function drawIceBlock(block) {
            ctx.save();
            ctx.fillStyle = block.color;
            ctx.fillRect(block.x, block.y, block.width, block.height);
            
            // Ice details
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 2;
            ctx.strokeRect(block.x, block.y, block.width, block.height);
            
            // Ice sparkles
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.arc(block.x + 10, block.y + 10, 2, 0, Math.PI * 2);
            ctx.arc(block.x + block.width - 10, block.y + block.height - 10, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // Draw platform
        function drawPlatform(platform) {
            ctx.save();
            ctx.fillStyle = platform.color;
            ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            
            // Platform shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(platform.x, platform.y + platform.height, platform.width, 5);
            
            // Platform details
            ctx.strokeStyle = '#DDD';
            ctx.lineWidth = 2;
            ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
            
            ctx.restore();
        }

        // Draw snow
        function drawSnow() {
            ctx.save();
            ctx.fillStyle = '#FFF';
            
            for (let particle of snowParticles) {
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        // Update snow particles
        function updateSnow() {
            for (let particle of snowParticles) {
                particle.y += particle.speed;
                
                // Reset particle when it falls off screen
                if (particle.y > canvas.height) {
                    particle.y = 0;
                    particle.x = Math.random() * canvas.width;
                }
                
                // Add some horizontal movement
                particle.x += Math.sin(Date.now() * 0.001 + particle.y * 0.01) * 0.5;
            }
        }

        // Update player
        function updatePlayer() {
            if (!gameRunning || gamePaused) return;

            // Horizontal movement
            if (keys.ArrowLeft) {
                player.x -= player.speed;
                player.direction = 'left';
            }
            if (keys.ArrowRight) {
                player.x += player.speed;
                player.direction = 'right';
            }

            // Jumping
            if (keys.Space && !player.isJumping && isOnPlatform()) {
                player.velocityY = -player.jumpForce;
                player.isJumping = true;
            }

            // Apply gravity
            player.velocityY += 0.8;
            player.y += player.velocityY;

            // Check if player is on a platform
            if (isOnPlatform() && player.velocityY > 0) {
                player.y = platforms.find(platform => 
                    player.y + player.height >= platform.y &&
                    player.y + player.height <= platform.y + platform.height &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width
                ).y - player.height;
                player.velocityY = 0;
                player.isJumping = false;
            }

            // Screen boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            }
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.velocityY = 0;
                player.isJumping = false;
            }
        }

        // Update fish
        function updateFish() {
            if (!gameRunning || gamePaused) return;

            for (let i = 0; i < fish.length; i++) {
                if (!fish[i].collected) {
                    // Fish float up and down
                    fish[i].y += Math.sin(Date.now() * 0.001 + i) * 0.5;
                    
                    // Check collision with player
                    if (checkCollision(player, fish[i])) {
                        fish[i].collected = true;
                        score += 10;
                        fishCollected++;
                        
                        // Check if level is complete
                        if (fishCollected >= fishToWin) {
                            level++;
                            fishToWin = Math.floor(fishToWin * 1.5);
                            fishCollected = 0;
                            
                            // Add more fish and sharks
                            for (let j = 0; j < 5; j++) {
                                fish.push({
                                    x: Math.random() * (canvas.width - 30),
                                    y: Math.random() * (canvas.height - 200) + 50,
                                    width: 25,
                                    height: 15,
                                    color: '#FF6B6B',
                                    collected: false
                                });
                            }
                            
                            for (let j = 0; j < 1; j++) {
                                sharks.push({
                                    x: Math.random() * (canvas.width - 60),
                                    y: Math.random() * (canvas.height - 300) + 100,
                                    width: 50,
                                    height: 30,
                                    speed: 2 + Math.random() * 2 + level * 0.5,
                                    direction: Math.random() > 0.5 ? 1 : -1,
                                    color: '#808080'
                                });
                            }
                        }
                    }
                }
            }
        }

        // Update sharks
        function updateSharks() {
            if (!gameRunning || gamePaused) return;

            for (let shark of sharks) {
                // Move shark
                shark.x += shark.speed * shark.direction;
                
                // Change direction when hitting boundaries
                if (shark.x < 0 || shark.x + shark.width > canvas.width) {
                    shark.direction *= -1;
                }
                
                // Check collision with player
                if (checkCollision(player, shark)) {
                    lives--;
                    score = Math.max(0, score - 50);
                    
                    // Reset player position
                    player.x = 100;
                    player.y = 400;
                    player.velocityY = 0;
                    player.isJumping = false;
                    
                    if (lives <= 0) {
                        gameRunning = false;
                        finalScoreDisplay.textContent = `Final Score: ${score}`;
                        gameOverScreen.style.display = 'block';
                    }
                }
            }
        }

        // Update ice blocks
        function updateIceBlocks() {
            if (!gameRunning || gamePaused) return;

            for (let block of iceBlocks) {
                // Check collision with player
                if (checkCollision(player, block)) {
                    // Ice blocks are slippery - move player
                    if (keys.ArrowLeft) {
                        player.x -= 2;
                    } else if (keys.ArrowRight) {
                        player.x += 2;
                    }
                }
            }
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background (ocean)
            ctx.fillStyle = '#1E90FF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw ice platforms (ground)
            ctx.fillStyle = '#F0F8FF';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // Draw platforms
            for (let platform of platforms) {
                drawPlatform(platform);
            }

            // Draw ice blocks
            for (let block of iceBlocks) {
                drawIceBlock(block);
            }

            // Draw fish
            for (let f of fish) {
                if (!f.collected) {
                    drawFish(f);
                }
            }

            // Draw sharks
            for (let shark of sharks) {
                drawShark(shark);
            }

            // Draw snow
            drawSnow();

            // Draw player
            drawPenguin();

            // Draw pause indicator
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFF';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
            }
        }

        // Main game loop
        function gameLoop() {
            if (gameRunning) {
                updatePlayer();
                updateFish();
                updateSharks();
                updateIceBlocks();
                updateSnow();
                updateScoreDisplay();
            }
            
            draw();
            
            if (!gamePaused) {
                requestAnimationFrame(gameLoop);
            } else {
                // If paused, keep drawing but don't update
                setTimeout(() => {
                    draw();
                    if (gamePaused) {
                        setTimeout(arguments.callee, 100);
                    } else {
                        requestAnimationFrame(gameLoop);
                    }
                }, 100);
            }
        }

        // Start the game
        init();
        gameLoop();
    </script>
</body>
</html>
